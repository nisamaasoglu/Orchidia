name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        # requirements-dev.txt already pulls in requirements.txt. No trained
        # model is committed, so the tests exercise the demo backend - which is
        # the point: a clean clone has to pass.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Test
        run: pytest -q
